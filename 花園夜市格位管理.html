<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花園夜市格位管理系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252a35;
    --accent: #f5a623;
    --accent2: #e8471e;
    --text: #e8e9ed;
    --text2: #8a8f9e;
    --stall-empty: #1a1f2a;
    --stall-hover: #2a3045;
    --stall-selected: #f5a623;
    --stall-has-owner: #1e2d1e;
    --stall-has-owner-border: #3a6b3a;
    --day-color: #f5a623;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo span { color: var(--text); font-weight: 300; }

  /* Day selector */
  .day-tabs {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .day-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-tab:hover { border-color: var(--accent); color: var(--accent); }
  .day-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* Search */
  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px 8px 36px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 16px;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--stall-hover); }
  .sri-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .sri-stalls { font-size: 12px; color: var(--accent); margin-top: 2px; }
  .sri-stalls span { background: rgba(245,166,35,0.15); border-radius: 4px; padding: 1px 6px; margin-right: 4px; }

  /* Stats bar */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Main layout */
  .main {
    display: flex;
    height: calc(100vh - 103px);
  }

  /* Map area */
  .map-area {
    flex: 1;
    overflow: auto;
    padding: 24px;
    background: var(--bg);
  }

  .map-container {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: max-content;
  }

  /* Row pair layout */
  .row-group {
    display: flex;
    align-items: stretch;
    gap: 3px;
    margin-bottom: 2px;
  }

  .row-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    padding: 4px 2px;
    white-space: nowrap;
    background: var(--surface);
    border-radius: 4px;
    min-width: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
  }

  .row-stalls {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-content: flex-start;
  }

  /* Stall cell */
  .stall {
    width: 44px;
    height: 36px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--stall-empty);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    flex-shrink: 0;
  }
  .stall:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--stall-hover);
    z-index: 2;
    transform: scale(1.08);
  }
  .stall.has-owner {
    background: var(--stall-has-owner);
    border-color: var(--stall-has-owner-border);
    color: #6dbf6d;
  }
  .stall.has-owner:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--stall-hover);
  }
  .stall.selected {
    background: var(--accent) !important;
    border-color: var(--accent) !important;
    color: #000 !important;
    font-weight: 700;
    transform: scale(1.08);
    z-index: 3;
    box-shadow: 0 0 0 2px rgba(245,166,35,0.4);
  }
  .stall.highlighted {
    background: rgba(245,166,35,0.2);
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { box-shadow: 0 0 0 0 rgba(245,166,35,0.4); }
    to { box-shadow: 0 0 0 4px rgba(245,166,35,0); }
  }

  .section-divider {
    height: 12px;
  }

  /* Side panel */
  .side-panel {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .selected-stall-id {
    font-size: 24px;
    font-weight: 900;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: -1px;
  }
  .selected-day-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 10px;
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* Owner form */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 6px;
    display: block;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text2); opacity: 0.5; }

  .btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #f7b84a; transform: translateY(-1px); }
  .btn-danger {
    background: transparent;
    border: 1px solid #c0392b;
    color: #c0392b;
    margin-top: 8px;
  }
  .btn-danger:hover { background: rgba(192,57,43,0.1); }

  /* Owner stalls info */
  .owner-stalls-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .owner-stalls-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .owner-stalls-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .owner-stall-badge {
    padding: 4px 10px;
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.1s;
  }
  .owner-stall-badge:hover { background: rgba(245,166,35,0.25); }

  /* Day columns for panel */
  .day-columns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .day-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .day-row.active-day { border-color: var(--accent); background: rgba(245,166,35,0.05); }
  .day-name {
    width: 28px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }
  .day-owner {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .day-owner.empty { color: var(--text2); font-style: italic; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--accent);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  .section-title {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 8px;
    background: var(--surface);
    border-radius: 4px;
    border: 1px solid var(--border);
    align-self: center;
    white-space: nowrap;
    margin: 2px 0;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">花園夜市 <span>格位管理</span></div>

  <div class="day-tabs" id="dayTabs">
    <button class="day-tab active" data-day="thu">週四</button>
    <button class="day-tab" data-day="fri">週五</button>
    <button class="day-tab" data-day="sat">週六</button>
    <button class="day-tab" data-day="sun">週日</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜尋格主姓名...">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-dot" style="background:#3a6b3a"></div><span id="filledCount">0</span> 已填格位</div>
  <div class="stat"><div class="stat-dot" style="background:var(--stall-empty);border:1px solid var(--border)"></div><span id="emptyCount">0</span> 空格</div>
</div>

<div class="main">
  <div class="map-area" id="mapArea"></div>

  <div class="side-panel">
    <div class="panel-header">
      <div class="panel-title">格位資訊</div>
      <div id="selectedLabel">
        <div class="selected-stall-id" style="color:var(--text2);font-size:16px;">請點選格位</div>
      </div>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="empty-state">
        <div class="empty-icon">🏮</div>
        <div class="empty-text">點選地圖上的格位<br>查看或編輯格主資訊</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Data model ───────────────────────────────────────────────────────────────
// Format: { "ROW-NUM": { thu: {name,phone,address}, fri: {...}, ... } }
let data = JSON.parse(localStorage.getItem('nightmarket_data') || '{}');

const DAYS = ['thu','fri','sat','sun'];
const DAY_LABELS = { thu:'週四', fri:'週五', sat:'週六', sun:'週日' };
let currentDay = 'thu';
let selectedStall = null;

// ─── Stall definitions ────────────────────────────────────────────────────────
function range(n) { return Array.from({length:n},(_,i)=>i+1); }

const ROWS = [
  { id:'一排',  stalls: range(32) },
  { id:'二排',  stalls: range(32) },
  { id:'三排',  stalls: range(32) },
  { id:'四排',  stalls: range(32) },
  { id:'A排',   stalls: range(32) },
  { id:'B排',   stalls: range(32) },
  { id:'五排',  stalls: range(32) },
  { id:'六排',  stalls: range(32) },
  { id:'七排',  stalls: range(32) },
  { id:'八排',  stalls: range(32) },
  { id:'九排',  stalls: range(32) },
  { id:'十排',  stalls: range(32) },
  { id:'十一排',stalls: range(32) },
  { id:'十二排',stalls: range(32) },
  { id:'十三排',stalls: range(47) },
  { id:'十四排',stalls: range(36) },
  { id:'十五排',stalls: range(29) },
  { id:'十六排',stalls: range(43) },
  { id:'十七排',stalls: range(43) },
  { id:'十八排',stalls: range(43) },
  { id:'十九排',stalls: range(45) },
  { id:'二十排',stalls: range(46) },
  { id:'二十一排',stalls: range(46) },
  { id:'二十二排',stalls: range(46) },
  { id:'二十三排',stalls: [1,2,3,4,5,6,'H.I區-1','H.I區-2','H.I區-3','H.I區-4','H.I區-5','H.I區-6','H.I區-7','H.I區-8','G區-1','G區-2','G區-3','G區-4','G區-5','G區-6','G區-7','G區-8','F區-1','F區-2','F區-3','F區-4','F區-5','F區-6','F區-7','F區-8'] },
  { id:'二十四排',stalls: range(5) },
  { id:'二十五排',stalls: range(5) },
  { id:'二十六排',stalls: range(5) },
  { id:'二十七排',stalls: range(5) },
  { id:'二十八排',stalls: range(5) },
  { id:'二十九排',stalls: range(5) },
  { id:'三十排',  stalls: range(5) },
  { id:'三十一排',stalls: range(5) },
  { id:'三十二排',stalls: range(5) },
  { id:'三十三排',stalls: range(5) },
  { id:'三十四排',stalls: range(5) },
  { id:'三十五排',stalls: [1,2,3,'3.5',4,5] },
  { id:'三十六排',stalls: range(7) },
  { id:'三十七排',stalls: [1,2,3,4,5,'C區-1','C區-2','C區-3','C區-4','C區-5','C區-6','C區-7','D區-1','D區-2','D區-3','D區-4','D區-5','D區-6','D區-7','E區-1','E區-2','E區-3','E區-4','E區-5','E區-6','E區-7'] },
  { id:'Y區', stalls: [1,2] },
];

function stallKey(rowId, stallNum) {
  return `${rowId}-${stallNum}`;
}

// ─── Render map ───────────────────────────────────────────────────────────────
function renderMap() {
  const area = document.getElementById('mapArea');
  area.innerHTML = '';
  const container = document.createElement('div');
  container.className = 'map-container';

  // Group rows into visual pairs
  const pairGroups = [
    [['一排','二排']],
    [['三排','四排']],
    [['A排','B排']],
    [['五排','六排']],
    [['七排','八排']],
    [['九排','十排']],
    [['十一排','十二排']],
    [['十三排']],
    [['十四排']],
    [['十五排']],
    [['十六排','十七排']],
    [['十八排','十九排']],
    [['二十排','二十一排']],
    [['二十二排']],
    [['二十三排']],
    [['二十四排','二十五排'],['二十六排','二十七排'],['二十八排','二十九排'],['三十排','三十一排'],['三十二排','三十三排'],['三十四排','三十五排']],
    [['三十六排']],
    [['三十七排']],
    [['Y區']],
  ];

  pairGroups.forEach(group => {
    group.forEach(pair => {
      const rowGroup = document.createElement('div');
      rowGroup.className = 'row-group';

      pair.forEach(rowId => {
        const rowDef = ROWS.find(r => r.id === rowId);
        if (!rowDef) return;

        const label = document.createElement('div');
        label.className = 'row-label';
        label.textContent = rowId;

        const stallsDiv = document.createElement('div');
        stallsDiv.className = 'row-stalls';

        rowDef.stalls.forEach(stallNum => {
          const key = stallKey(rowId, stallNum);
          const cell = document.createElement('div');
          cell.className = 'stall';
          cell.dataset.key = key;

          const display = String(stallNum).length > 4 
            ? String(stallNum).substring(0,4)+'…' 
            : stallNum;
          cell.textContent = display;
          cell.title = `${rowId} ${stallNum}號`;

          const info = getOwnerInfo(key);
          if (info && info.name) cell.classList.add('has-owner');
          if (key === selectedStall) cell.classList.add('selected');

          cell.addEventListener('click', () => selectStall(key, rowId, stallNum));
          stallsDiv.appendChild(cell);
        });

        rowGroup.appendChild(label);
        rowGroup.appendChild(stallsDiv);
      });

      container.appendChild(rowGroup);
    });

    const div = document.createElement('div');
    div.className = 'section-divider';
    container.appendChild(div);
  });

  area.appendChild(container);
  updateStats();
}

function getOwnerInfo(key) {
  return data[key] && data[key][currentDay] ? data[key][currentDay] : null;
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  let total = 0, filled = 0;
  ROWS.forEach(r => {
    r.stalls.forEach(s => {
      total++;
      const info = getOwnerInfo(stallKey(r.id, s));
      if (info && info.name) filled++;
    });
  });
  document.getElementById('filledCount').textContent = filled;
  document.getElementById('emptyCount').textContent = total - filled;
}

// ─── Select stall ─────────────────────────────────────────────────────────────
function selectStall(key, rowId, stallNum) {
  // Remove old selection
  document.querySelectorAll('.stall.selected').forEach(el => el.classList.remove('selected'));

  selectedStall = key;
  const el = document.querySelector(`.stall[data-key="${key}"]`);
  if (el) el.classList.add('selected');

  renderPanel(key, rowId, stallNum);
}

function renderPanel(key, rowId, stallNum) {
  // Header
  document.getElementById('selectedLabel').innerHTML = `
    <div class="selected-stall-id">${rowId} ${stallNum}號</div>
    <div class="selected-day-badge">${DAY_LABELS[currentDay]}</div>
  `;

  const info = getOwnerInfo(key) || {};
  const body = document.getElementById('panelBody');

  // Show all days summary first
  const daySummary = DAYS.map(d => {
    const di = data[key] && data[key][d];
    return `<div class="day-row ${d === currentDay ? 'active-day' : ''}">
      <div class="day-name">${DAY_LABELS[d]}</div>
      <div class="day-owner ${di && di.name ? '' : 'empty'}">${di && di.name ? di.name : '（空）'}</div>
    </div>`;
  }).join('');

  // Get all stalls for same owner on current day (if owner exists)
  let ownerStallsHtml = '';
  if (info.name) {
    const ownerStalls = getAllStallsForOwner(info.name, currentDay).filter(k => k !== key);
    if (ownerStalls.length > 0) {
      ownerStallsHtml = `
        <div class="owner-stalls-section">
          <div class="owner-stalls-title">${info.name} 本日其他格位</div>
          <div class="owner-stalls-list">
            ${ownerStalls.map(k => `<div class="owner-stall-badge" onclick="jumpToStall('${k}')">${formatKey(k)}</div>`).join('')}
          </div>
        </div>`;
    }
  }

  body.innerHTML = `
    <div class="day-columns">${daySummary}</div>
    <div style="height:1px;background:var(--border);margin:12px 0"></div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:12px">${DAY_LABELS[currentDay]} 格主資料</div>
    <div class="form-group">
      <label class="form-label">姓名</label>
      <input class="form-input" id="fi_name" placeholder="格主姓名" value="${info.name || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">電話</label>
      <input class="form-input" id="fi_phone" placeholder="聯絡電話" value="${info.phone || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">地址</label>
      <input class="form-input" id="fi_address" placeholder="聯絡地址" value="${info.address || ''}">
    </div>
    <button class="btn btn-primary" onclick="saveInfo('${key}')">💾 儲存</button>
    ${info.name ? `<button class="btn btn-danger" onclick="deleteInfo('${key}')">🗑 清除此格位資料</button>` : ''}
    ${ownerStallsHtml}
  `;
}

function formatKey(key) {
  const parts = key.split('-');
  // key format: rowId-stallNum, but rowId might contain -
  // Since rowId doesn't contain '-', it's safe: stallKey = `${rowId}-${stallNum}`
  const lastDash = key.lastIndexOf('-');
  return key.substring(0, lastDash) + ' ' + key.substring(lastDash+1) + '號';
}

// ─── Save / Delete ────────────────────────────────────────────────────────────
function saveInfo(key) {
  const name = document.getElementById('fi_name').value.trim();
  const phone = document.getElementById('fi_phone').value.trim();
  const address = document.getElementById('fi_address').value.trim();

  if (!data[key]) data[key] = {};
  data[key][currentDay] = { name, phone, address };
  localStorage.setItem('nightmarket_data', JSON.stringify(data));

  // Update cell appearance
  const el = document.querySelector(`.stall[data-key="${key}"]`);
  if (el) {
    if (name) el.classList.add('has-owner');
    else el.classList.remove('has-owner');
  }

  // Re-render panel to show updated days
  const lastDash = key.lastIndexOf('-');
  renderPanel(key, key.substring(0, lastDash), key.substring(lastDash+1));
  updateStats();
  showToast('✅ 已儲存');
}

function deleteInfo(key) {
  if (!confirm('確定要清除這個格位的格主資料嗎？')) return;
  if (data[key]) {
    delete data[key][currentDay];
    if (Object.keys(data[key]).length === 0) delete data[key];
  }
  localStorage.setItem('nightmarket_data', JSON.stringify(data));

  const el = document.querySelector(`.stall[data-key="${key}"]`);
  if (el) {
    const hasAnyOwner = DAYS.some(d => data[key] && data[key][d] && data[key][d].name);
    if (!hasAnyOwner) el.classList.remove('has-owner');
  }

  const lastDash = key.lastIndexOf('-');
  renderPanel(key, key.substring(0, lastDash), key.substring(lastDash+1));
  updateStats();
  showToast('🗑 已清除');
}

// ─── Owner search ─────────────────────────────────────────────────────────────
function getAllStallsForOwner(name, day) {
  return Object.keys(data).filter(key => {
    return data[key][day] && data[key][day].name === name;
  });
}

function getAllOwners() {
  const owners = {};
  Object.keys(data).forEach(key => {
    DAYS.forEach(d => {
      const info = data[key][d];
      if (info && info.name) {
        if (!owners[info.name]) owners[info.name] = { ...info, stalls: [] };
        owners[info.name].stalls.push({ key, day: d });
      }
    });
  });
  return owners;
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  const resultsEl = document.getElementById('searchResults');
  if (!q) { resultsEl.classList.remove('open'); return; }

  const owners = getAllOwners();
  const matches = Object.entries(owners).filter(([name]) => name.includes(q));

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="search-result-item" style="color:var(--text2)">找不到格主</div>';
  } else {
    resultsEl.innerHTML = matches.map(([name, info]) => {
      const dayStalls = {};
      info.stalls.forEach(({ key, day }) => {
        if (!dayStalls[day]) dayStalls[day] = [];
        dayStalls[day].push(key);
      });
      const stallPills = info.stalls
        .filter(s => s.day === currentDay)
        .map(s => `<span>${formatKey(s.key)}</span>`).join('');
      return `<div class="search-result-item" onclick="highlightOwner('${name}')">
        <div class="sri-name">${name} <span style="color:var(--text2);font-size:11px">${info.phone || ''}</span></div>
        <div class="sri-stalls">${stallPills || '<span style="color:var(--text2)">本日無格位</span>'}</div>
      </div>`;
    }).join('');
  }

  resultsEl.classList.add('open');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('searchResults').classList.remove('open');
  }
});

function highlightOwner(name) {
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value = name;

  // Clear previous highlights
  document.querySelectorAll('.stall.highlighted').forEach(el => el.classList.remove('highlighted'));

  const stalls = getAllStallsForOwner(name, currentDay);
  stalls.forEach(key => {
    const el = document.querySelector(`.stall[data-key="${key}"]`);
    if (el) {
      el.classList.add('highlighted');
      el.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  });

  if (stalls.length === 0) {
    showToast(`${name} 本日（${DAY_LABELS[currentDay]}）沒有格位`);
  } else {
    showToast(`已標示 ${name} 的 ${stalls.length} 個格位`);
    // Also select and show first stall
    const lastDash = stalls[0].lastIndexOf('-');
    selectStall(stalls[0], stalls[0].substring(0,lastDash), stalls[0].substring(lastDash+1));
  }
}

function jumpToStall(key) {
  const el = document.querySelector(`.stall[data-key="${key}"]`);
  if (!el) return;
  el.scrollIntoView({ behavior:'smooth', block:'center' });
  const lastDash = key.lastIndexOf('-');
  selectStall(key, key.substring(0,lastDash), key.substring(lastDash+1));
}

// ─── Day switch ───────────────────────────────────────────────────────────────
document.getElementById('dayTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.day-tab');
  if (!btn) return;
  document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDay = btn.dataset.day;

  // Re-render has-owner classes
  ROWS.forEach(row => {
    row.stalls.forEach(stallNum => {
      const key = stallKey(row.id, stallNum);
      const el = document.querySelector(`.stall[data-key="${key}"]`);
      if (!el) return;
      const info = getOwnerInfo(key);
      if (info && info.name) el.classList.add('has-owner');
      else el.classList.remove('has-owner');
    });
  });

  // Re-render panel if stall selected
  if (selectedStall) {
    const lastDash = selectedStall.lastIndexOf('-');
    renderPanel(selectedStall, selectedStall.substring(0,lastDash), selectedStall.substring(lastDash+1));
  }
  updateStats();
});

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderMap();
</script>
</body>
</html>
