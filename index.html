<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花園夜市格位管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#0e0f13;--sur:#161820;--sur2:#1e2130;--bdr:#2a2f40;
  --acc:#f5a623;--acc2:rgba(245,166,35,.15);--acc3:rgba(245,166,35,.3);
  --grn:#3ecf6e;--grn2:rgba(62,207,110,.12);--grn3:rgba(62,207,110,.3);
  --tx:#e2e4ed;--tx2:#6b7280;--tx3:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',sans-serif;display:flex;flex-direction:column}
.hd{background:var(--sur);border-bottom:1px solid var(--bdr);padding:9px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap;z-index:50}
.logo{font-size:17px;font-weight:900;color:var(--acc);white-space:nowrap}
.logo span{color:var(--tx3);font-weight:300;font-size:13px}
.dtabs{display:flex;gap:3px}
.dtab{padding:5px 11px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--tx2);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.dtab:hover{border-color:var(--acc);color:var(--acc)}
.dtab.active{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700}
.swrap{position:relative;flex:1;min-width:150px;max-width:260px}
.sinput{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px 7px 30px;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.sinput:focus{border-color:var(--acc)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx2);font-size:13px}
.sres{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;max-height:260px;overflow-y:auto;z-index:200;display:none}
.sres.open{display:block}
.sri{padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .1s}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--sur)}
.sri-n{font-size:13px;font-weight:500}
.sri-s{font-size:11px;color:var(--acc);margin-top:2px}
.sri-s span{background:var(--acc2);border-radius:3px;padding:1px 4px;margin-right:3px}
.stats{font-size:11px;color:var(--tx2);display:flex;gap:10px;align-items:center}
.sdot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:3px}

/* Quick find */
.qfwrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qflbl{font-size:11px;color:var(--tx2);white-space:nowrap}
.qfsel{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;cursor:pointer;transition:border-color .2s}
.qfsel:focus{border-color:var(--acc)}
.qfinput{width:60px;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
.qfinput:focus{border-color:var(--acc)}
.qfbtn{padding:5px 12px;background:var(--acc);border:none;border-radius:6px;color:#000;font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.qfbtn:hover{background:#f7b94a}

/* Bulk edit table */
.btbl{width:100%;border-collapse:collapse;font-size:12px}
.btbl th{background:var(--sur2);color:var(--tx2);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border:1px solid var(--bdr);text-align:left;position:sticky;top:0;z-index:2}
.btbl td{border:1px solid var(--bdr);padding:2px}
.btbl tr:hover td{background:rgba(255,255,255,.02)}
.btbl td:first-child{background:var(--sur2);color:var(--tx2);font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;white-space:nowrap;text-align:center}
.btbl input{width:100%;background:transparent;border:none;outline:none;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:6px 8px}
.btbl input:focus{background:rgba(245,166,35,.08);border-radius:3px}
.btbl tr.has-data td{background:rgba(62,207,110,.05)}
.bwrap{display:flex;flex:1;overflow:hidden;min-height:0}
.mscroll{flex:1;overflow:auto;padding:14px;min-height:0}

/* Cell: each stall = blank | number | blank (3 cols) */
.cell{
  display:flex;flex-direction:row;flex-shrink:0;cursor:pointer;
  transition:all .1s;
}
.cell-blank{
  width:22px;height:24px;
  border:1px solid var(--bdr);background:var(--sur2);
  flex-shrink:0;transition:all .1s;
}
.cell-blank:first-child{border-radius:3px 0 0 3px;border-right:none}
.cell-blank:last-child{border-radius:0 3px 3px 0;border-left:none}
.cell-num{
  width:28px;height:24px;
  border:1px solid var(--bdr);background:var(--sur2);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-family:'Share Tech Mono',monospace;
  color:var(--tx2);flex-shrink:0;transition:all .1s;
}
.cell:hover .cell-blank,
.cell:hover .cell-num{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}
.cell.has .cell-blank,.cell.has .cell-num{background:var(--grn2);border-color:var(--grn3);color:var(--grn)}
.cell.sel .cell-blank,.cell.sel .cell-num{background:var(--acc)!important;border-color:var(--acc)!important;color:#000!important;font-weight:700}
.cell.hl .cell-blank,.cell.hl .cell-num{background:rgba(245,166,35,.22);border-color:var(--acc);color:var(--acc);animation:hp 1s ease-in-out infinite alternate}
@keyframes hp{from{box-shadow:0 0 0 0 rgba(245,166,35,.4)}to{box-shadow:0 0 0 3px rgba(245,166,35,0)}}

/* Horizontal stall for 13排/15排 rows */
.hcell{
  display:flex;flex-direction:column;flex-shrink:0;cursor:pointer;transition:all .1s;
}
.hcell-blank{width:36px;height:16px;border:1px solid var(--bdr);background:var(--sur2);flex-shrink:0;transition:all .1s;}
.hcell-blank:first-child{border-radius:3px 3px 0 0;border-bottom:none}
.hcell-blank:last-child{border-radius:0 0 3px 3px;border-top:none}
.hcell-num{width:36px;height:20px;border:1px solid var(--bdr);background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:7px;font-family:'Share Tech Mono',monospace;color:var(--tx2);flex-shrink:0;transition:all .1s;}
.hcell:hover .hcell-blank,.hcell:hover .hcell-num{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}
.hcell.has .hcell-blank,.hcell.has .hcell-num{background:var(--grn2);border-color:var(--grn3);color:var(--grn)}
.hcell.sel .hcell-blank,.hcell.sel .hcell-num{background:var(--acc)!important;border-color:var(--acc)!important;color:#000!important;font-weight:700}

/* Zone */
.zone{border:1px solid var(--bdr);background:var(--sur2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--tx2);cursor:pointer;flex-shrink:0;transition:all .1s;text-align:center}
.zone:hover{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}
.zone.has{background:var(--grn2);border-color:var(--grn3);color:var(--grn)}
.zone.sel{background:var(--acc)!important;border-color:var(--acc)!important;color:#000!important;font-weight:700}

/* Labels */
.lbl{font-size:7px;font-family:'Share Tech Mono',monospace;color:var(--tx2);background:var(--sur);border:1px solid var(--bdr);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:1px 2px;white-space:nowrap}

/* Side panel */
.spanel{width:290px;flex-shrink:0;background:var(--sur);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.pt{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--tx2);margin-bottom:5px}
.sid{font-size:20px;font-weight:900;color:var(--acc);font-family:'Share Tech Mono',monospace}
.dbadge{display:inline-block;margin-top:4px;padding:2px 8px;background:var(--acc2);border:1px solid var(--acc3);border-radius:20px;font-size:11px;color:var(--acc)}
.pb{flex:1;overflow-y:auto;padding:14px}
.estate{text-align:center;padding:32px 14px;color:var(--tx2)}
.eico{font-size:38px;margin-bottom:9px;opacity:.3}
.etxt{font-size:13px;line-height:1.7}
.fg{margin-bottom:12px}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:4px;display:block}
.fi{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:8px 11px;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--tx2);opacity:.5}
.btn{width:100%;padding:9px;border-radius:7px;border:none;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:3px}
.btnp{background:var(--acc);color:#000}.btnp:hover{background:#f7b94a}
.btnd{background:transparent;border:1px solid #c0392b;color:#c0392b;margin-top:5px}.btnd:hover{background:rgba(192,57,43,.1)}
.drws{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.drw{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr)}
.drw.cur{border-color:var(--acc);background:var(--acc2)}
.dn{width:24px;font-size:11px;color:var(--tx2);font-weight:500}
.do{flex:1;font-size:12px;font-weight:500}
.do.empty{color:var(--tx2);font-style:italic}
.divider{height:1px;background:var(--bdr);margin:9px 0}
.subt{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:9px}
.oss{margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.ost{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:7px}
.osl{display:flex;flex-wrap:wrap;gap:4px}
.osb{padding:3px 7px;background:var(--acc2);border:1px solid rgba(245,166,35,.25);border-radius:5px;font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--acc);cursor:pointer}
.osb:hover{background:rgba(245,166,35,.25)}
.toast{position:fixed;bottom:18px;right:18px;background:var(--sur);border:1px solid var(--acc);border-radius:8px;padding:9px 16px;font-size:12px;color:var(--acc);z-index:999;transform:translateY(55px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>
<body>
<header class="hd">
  <div class="logo">花園夜市 <span>格位管理</span></div>
  <div class="dtabs" id="dayTabs">
    <button class="dtab active" data-day="thu">週四</button>
    <button class="dtab" data-day="fri">週五</button>
    <button class="dtab" data-day="sat">週六</button>
    <button class="dtab" data-day="sun">週日</button>
  </div>
  <div class="swrap">
    <span class="sico">🔍</span>
    <input class="sinput" id="si" type="text" placeholder="搜尋格主姓名...">
    <div class="sres" id="sr"></div>
  </div>
  <div class="stats">
    <span><span class="sdot" style="background:var(--grn)"></span><span id="fc">0</span> 已填</span>
    <span><span class="sdot" style="background:var(--sur2);border:1px solid var(--bdr)"></span><span id="ec">0</span> 空格</span>
  </div>
  <div class="qfwrap">
    <span class="qflbl">格位查找</span>
    <select class="qfsel" id="qfRow" onchange="updateNumSelect()">
      <option value="">選擇排</option>
    </select>
    <select class="qfsel" id="qfNum" style="min-width:70px">
      <option value="">選號碼</option>
    </select>
    <button class="qfbtn" onclick="quickFind()">前往</button>
  </div>
  <button class="qfbtn" style="background:var(--sur2);border:1px solid var(--bdr);color:var(--tx)" onclick="openBulk()">📋 大量編輯</button>
  <button class="qfbtn" style="background:#1a7f3c;color:#fff" onclick="openCSV()">📥 CSV 匯入</button>
</header>

<!-- CSV Import Modal -->
<div id="csvModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:12px;width:90vw;max-width:800px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:#3ecf6e;flex:1">📥 Google Sheet CSV 匯入</div>
      <button class="qfbtn" onclick="downloadTemplate()" style="background:#0f62fe;color:#fff">⬇️ 下載範本</button>
      <button class="qfbtn" onclick="closeCSV()" style="background:transparent;border:1px solid var(--bdr);color:var(--tx2)">✕ 關閉</button>
    </div>
    <div style="padding:12px 20px;background:var(--sur2);border-bottom:1px solid var(--bdr);font-size:11px;color:var(--tx2);flex-shrink:0;line-height:1.8">
      <b style="color:var(--acc)">使用步驟：</b>
      1. 按「⬇️ 下載範本」取得 CSV 格式範本，上傳到 Google Sheet 編輯&nbsp;&nbsp;
      2. 在 Google Sheet 點 <b>檔案 → 下載 → CSV</b>&nbsp;&nbsp;
      3. 用文字編輯器（記事本）開啟 CSV，全選複製&nbsp;&nbsp;
      4. 貼到下方欄位，按「匯入」
    </div>
    <div style="padding:16px 20px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--tx2);white-space:nowrap">匯入模式：</label>
        <select id="csvMode" class="qfsel" style="font-size:12px">
          <option value="merge">合併（保留現有，只更新有填的欄位）</option>
          <option value="overwrite">覆蓋（清空後全部重寫）</option>
        </select>
      </div>
      <textarea id="csvInput" placeholder="在此貼上從 Google Sheet 下載的 CSV 內容..." style="flex:1;min-height:280px;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:12px;color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:11px;resize:none;outline:none;line-height:1.6"></textarea>
      <div id="csvPreview" style="font-size:11px;color:var(--tx2)"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="qfbtn" onclick="previewCSV()" style="background:var(--sur2);border:1px solid var(--bdr);color:var(--tx)">🔍 預覽</button>
        <button class="qfbtn" onclick="importCSV()" style="background:#1a7f3c;color:#fff;font-size:14px;padding:8px 20px">✅ 確認匯入</button>
      </div>
    </div>
  </div>
</div>

<!-- Bulk Edit Modal -->
<div id="bulkModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:12px;width:90vw;max-width:900px;height:85vh;display:flex;flex-direction:column;overflow:hidden">
    <!-- Modal header -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:var(--acc);flex:1">📋 大量編輯格位資料</div>
      <select id="bulkDay" class="qfsel" style="font-size:12px">
        <option value="thu">週四</option>
        <option value="fri">週五</option>
        <option value="sat">週六</option>
        <option value="sun">週日</option>
      </select>
      <select id="bulkRow" class="qfsel" onchange="loadBulkTable()" style="font-size:12px">
        <option value="">選擇排</option>
      </select>
      <button class="qfbtn" onclick="importBulk()" style="background:var(--grn);color:#000">✅ 匯入儲存</button>
      <button class="qfbtn" onclick="closeBulk()" style="background:transparent;border:1px solid var(--bdr);color:var(--tx2)">✕ 關閉</button>
    </div>
    <!-- Tips -->
    <div style="padding:8px 20px;font-size:11px;color:var(--tx2);background:var(--sur2);border-bottom:1px solid var(--bdr);flex-shrink:0">
      💡 選擇排之後會載入所有格位，填寫完成後按「匯入儲存」一次寫入。Tab 鍵可快速切換欄位。
    </div>
    <!-- Table -->
    <div style="flex:1;overflow:auto;padding:16px">
      <div id="bulkTableWrap">
        <div style="text-align:center;padding:40px;color:var(--tx2)">請先選擇排來載入格位清單</div>
      </div>
    </div>
  </div>
</div>
<div class="bwrap">
  <div class="mscroll"><div id="mc" style="display:inline-flex;flex-direction:column;gap:0"></div></div>
  <div class="spanel">
    <div class="ph"><div class="pt">格位資訊</div><div id="phc"><div class="sid" style="color:var(--tx2);font-size:14px">請點選格位</div></div></div>
    <div class="pb" id="pb"><div class="estate"><div class="eico">🏮</div><div class="etxt">點選地圖上的格位<br>查看或編輯格主資訊</div></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// Cell dimensions
const BW=22, NW=28, CH=24; // blank width, num width, cell height
const HCW=36, HBH=16, HNH=20; // horizontal cell
const G=1, A=8; // gap, aisle

let data=JSON.parse(localStorage.getItem('nm7')||'{}');
const DAYS=['thu','fri','sat','sun'],DL={thu:'週四',fri:'週五',sat:'週六',sun:'週日'};
let today='thu',selKey=null;

function rng(n){return Array.from({length:n},(_,i)=>i+1)}
function sk(row,num){return row+'|'+num}
function pk(key){const i=key.lastIndexOf('|');return[key.slice(0,i),key.slice(i+1)]}
function gi(key){return data[key]&&data[key][today]?data[key][today]:null}
function D(cls){const e=document.createElement('div');if(cls)e.className=cls;return e}
function frow(g){const e=D();e.style.cssText=`display:flex;flex-direction:row;gap:${g??G}px;align-items:flex-start`;return e}
function fcol(g){const e=D();e.style.cssText=`display:flex;flex-direction:column;gap:${g??G}px`;return e}
function vsp(h){const e=D();e.style.height=h+'px';return e}
function hsp(w){const e=D();e.style.cssText=`width:${w}px;flex-shrink:0`;return e}

/* Vertical stall: number號 | blank - 2 cols */
function makeStall(rowId,num){
  const key=sk(rowId,num);
  const wrap=D('cell');
  wrap.dataset.key=key;
  const s=String(num);

  const n=D('cell-num');n.dataset.key=key;
  n.style.cssText=`width:${NW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:8px;font-family:'Share Tech Mono',monospace;color:var(--tx2);flex-shrink:0;transition:all .1s;border-right:none;border-radius:3px 0 0 3px`;
  n.textContent=s+'號';
  n.title=`${rowId} ${num}號`;

  const b=D('cell-blank');b.dataset.key=key;
  b.style.cssText=`width:${NW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-left:none;border-radius:0 3px 3px 0;flex-shrink:0;transition:all .1s`;

  wrap.style.cssText='display:flex;flex-direction:row;gap:0;flex-shrink:0;cursor:pointer';
  wrap.appendChild(n);wrap.appendChild(b);
  refreshOne(wrap,key);
  wrap.addEventListener('click',()=>selectStall(key));
  return wrap;
}

/* Horizontal stall: number號 | blank - 2 cols stacked */
function makeHStall(rowId,num){
  const key=sk(rowId,num);
  const wrap=D('hcell');
  wrap.dataset.key=key;
  const s=String(num);

  const n=D('hcell-num');n.dataset.key=key;
  n.style.cssText=`width:${HCW}px;height:${HNH}px;border:1px solid var(--bdr);background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:7px;font-family:'Share Tech Mono',monospace;color:var(--tx2);flex-shrink:0;transition:all .1s;border-bottom:none;border-radius:3px 3px 0 0`;
  n.textContent=s+'號';
  n.title=`${rowId} ${num}號`;

  const b=D('hcell-blank');b.dataset.key=key;
  b.style.cssText=`width:${HCW}px;height:${HBH}px;border:1px solid var(--bdr);background:var(--sur2);border-top:none;border-radius:0 0 3px 3px;flex-shrink:0;transition:all .1s`;

  wrap.style.cssText='display:flex;flex-direction:column;gap:0;flex-shrink:0;cursor:pointer';
  wrap.appendChild(n);wrap.appendChild(b);
  refreshOne(wrap,key);
  wrap.addEventListener('click',()=>selectStall(key));
  return wrap;
}

function makeZone(rowId,w,h){
  const key=sk(rowId,'z');
  const e=D('zone');
  e.dataset.key=key;
  e.style.cssText=`width:${w}px;height:${h}px`;
  e.textContent=rowId;
  refreshOne(e,key);
  e.addEventListener('click',()=>selectStall(key));
  return e;
}

function refreshOne(e,key){
  const info=gi(key);
  e.classList.toggle('has',!!(info&&info.name));
  e.classList.toggle('sel',key===selKey);
}
function refreshAll(){
  document.querySelectorAll('.cell,.hcell,.zone').forEach(e=>{
    if(e.dataset.key)refreshOne(e,e.dataset.key);
  });
  // Refresh pair rows
  document.querySelectorAll('div').forEach(row=>{
    if(!row._isPairRow)return;
    applyPairStyle(row._pairA.key,row._pairA.els,row._pairB.key,row._pairB.els);
  });
}

/* Single col width = NW*2 (num + blank) */
const CW = NW*2;

function colLbl(text){
  const e=D('lbl');
  e.style.cssText=`width:${CW}px;height:14px;font-size:7px;margin-bottom:${G}px;text-align:center`;
  e.textContent=text;return e;
}
function rowLbl(text){
  const e=D('lbl');
  e.style.cssText=`width:30px;height:${CH}px;font-size:7px;flex-shrink:0`;
  e.textContent=text;return e;
}

/* Vertical column */
function vcol(rowId,stalls){
  const col=fcol(G);
  col.appendChild(colLbl(rowId));
  stalls.forEach(n=>col.appendChild(makeStall(rowId,n)));
  return col;
}

/* Pair: blank|numA|blank|numB|blank, shared middle blank */
function vpair(a,b,n){
  const wrap=fcol(0);
  // Header: A name left, B name right
  const hdr=D('lbl');
  hdr.style.cssText=`width:${BW+NW+BW+NW+BW}px;height:14px;font-size:7px;display:flex;flex-direction:row;justify-content:space-between;padding:0 4px;margin-bottom:${G}px;border-radius:3px`;
  const sA=document.createElement('span');sA.textContent=a;
  const sB=document.createElement('span');sB.textContent=b;
  hdr.appendChild(sA);hdr.appendChild(sB);
  wrap.appendChild(hdr);

  rng(n).forEach(num=>{
    const keyA=sk(a,num), keyB=sk(b,num);
    const sNum=String(num);
    const disp=sNum.length>3?sNum.slice(0,3):sNum;

    const row=D();
    row.style.cssText=`display:flex;flex-direction:row;gap:0;margin-bottom:${G}px`;

    // blank A
    const b1=D('cell-blank');
    b1.style.cssText=`width:${BW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-right:none;border-radius:3px 0 0 3px;cursor:pointer;transition:all .1s`;
    b1.dataset.key=keyA;

    // num A
    const nA=D('cell-num');
    nA.style.cssText=`width:${NW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-right:none;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:'Share Tech Mono',monospace;color:var(--tx2);cursor:pointer;transition:all .1s;border-radius:0`;
    nA.textContent=disp;nA.title=`${a} ${num}號`;nA.dataset.key=keyA;

    // shared middle blank
    const bM=D('cell-blank');
    bM.style.cssText=`width:${BW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-left:none;border-right:none;cursor:pointer;transition:all .1s;border-radius:0`;
    bM.dataset.key=keyA; // clicking middle goes to A

    // num B
    const nB=D('cell-num');
    nB.style.cssText=`width:${NW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-left:none;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:'Share Tech Mono',monospace;color:var(--tx2);cursor:pointer;transition:all .1s;border-radius:0`;
    nB.textContent=disp;nB.title=`${b} ${num}號`;nB.dataset.key=keyB;

    // blank B
    const b2=D('cell-blank');
    b2.style.cssText=`width:${BW}px;height:${CH}px;border:1px solid var(--bdr);background:var(--sur2);border-left:none;border-radius:0 3px 3px 0;cursor:pointer;transition:all .1s`;
    b2.dataset.key=keyB;

    // click handlers
    [b1,nA,bM].forEach(el=>el.addEventListener('click',()=>selectStall(keyA)));
    [nB,b2].forEach(el=>el.addEventListener('click',()=>selectStall(keyB)));

    // hover effect via mouseenter/leave
    const elsA=[b1,nA,bM], elsB=[nB,b2];
    elsA.forEach(el=>{
      el.addEventListener('mouseenter',()=>{if(selKey!==keyA)elsA.forEach(e=>{e.style.borderColor='var(--acc)';e.style.background='rgba(245,166,35,.08)';e.style.color='var(--acc)'})});
      el.addEventListener('mouseleave',()=>applyPairStyle(keyA,elsA,keyB,elsB));
    });
    elsB.forEach(el=>{
      el.addEventListener('mouseenter',()=>{if(selKey!==keyB)elsB.forEach(e=>{e.style.borderColor='var(--acc)';e.style.background='rgba(245,166,35,.08)';e.style.color='var(--acc)'})});
      el.addEventListener('mouseleave',()=>applyPairStyle(keyA,elsA,keyB,elsB));
    });

    // store for refresh
    row._pairA={key:keyA,els:elsA};
    row._pairB={key:keyB,els:elsB};
    row._isPairRow=true;

    row.appendChild(b1);row.appendChild(nA);row.appendChild(bM);row.appendChild(nB);row.appendChild(b2);
    wrap.appendChild(row);
  });
  return wrap;
}

function applyPairStyle(keyA,elsA,keyB,elsB){
  const infoA=gi(keyA),infoB=gi(keyB);
  const selA=selKey===keyA,selB=selKey===keyB;
  elsA.forEach(e=>{
    e.style.background=selA?'var(--acc)':(infoA&&infoA.name)?'var(--grn2)':'var(--sur2)';
    e.style.borderColor=selA?'var(--acc)':(infoA&&infoA.name)?'var(--grn3)':'var(--bdr)';
    e.style.color=selA?'#000':(infoA&&infoA.name)?'var(--grn)':'var(--tx2)';
  });
  elsB.forEach(e=>{
    e.style.background=selB?'var(--acc)':(infoB&&infoB.name)?'var(--grn2)':'var(--sur2)';
    e.style.borderColor=selB?'var(--acc)':(infoB&&infoB.name)?'var(--grn3)':'var(--bdr)';
    e.style.color=selB?'#000':(infoB&&infoB.name)?'var(--grn)':'var(--tx2)';
  });
}

/* Horizontal row of stalls */
function hrowStalls(rowId,stalls){
  const row=frow(G);
  row.style.alignItems='center';
  row.appendChild(rowLbl(rowId));
  stalls.forEach(n=>row.appendChild(makeHStall(rowId,n)));
  return row;
}

function buildMap(){
  const mc=document.getElementById('mc');
  mc.innerHTML='';

  /* ══ 1. 13排 top horizontal ══ */
  mc.appendChild(hrowStalls('13排',rng(47)));
  mc.appendChild(vsp(A));

  /* ══ 2. Main columns + 15排 block ══
     Left-to-right order:
     十四排 | 一排+二排 | 三排+四排 | A排+B排 | 五排+六排 | 七排+八排 | 九排+十排 | 十一排+十二排
     [below: 15排 + H.I/G/F + 二十三排]
     十六排+十七排 | 十八排+十九排 | 二十排+二十一排 | 二十二排

     二十二排 aligns under 13排 47號 (rightmost)
     So we render right columns first conceptually but display left→right
  */

  // Left group columns (十四排 through 十二排)
  const leftCols=frow(A);
  leftCols.style.alignItems='flex-start';
  leftCols.appendChild(vcol('十四排',rng(36)));
  [['一排','二排',32],['三排','四排',32],['A排','B排',32],
   ['五排','六排',32],['七排','八排',32],['九排','十排',32],['十一排','十二排',32]
  ].forEach(([a,b,n])=>leftCols.appendChild(vpair(a,b,n)));

  // Left block: left cols + 15排 below + zones below that
  const leftBlock=fcol(A);
  leftBlock.style.alignItems='flex-start';
  leftBlock.appendChild(leftCols);
  leftBlock.appendChild(hrowStalls('15排',rng(29)));

  // H.I G F + 二十三排 right-aligned under 15排
  // 15排 total width = rowLbl(30) + G + 29*(HCW+G) - G
  const row15W = 30 + G + 29*(HCW+G) - G;
  const zh=CH*6, zw=CW*3;
  const zonesWrap=D();
  zonesWrap.style.cssText=`display:flex;flex-direction:row;justify-content:flex-end;width:${row15W}px`;
  const zonesRow=frow(G);
  zonesRow.style.alignItems='flex-start';
  zonesRow.appendChild(makeZone('H.I區\n(八格)',zw,zh));
  zonesRow.appendChild(makeZone('G區\n(八格)',zw,zh));
  zonesRow.appendChild(makeZone('F區\n(八格)',zw,zh));
  zonesRow.appendChild(hsp(A));
  zonesRow.appendChild(vcol('二十三排',rng(6)));
  zonesWrap.appendChild(zonesRow);
  leftBlock.appendChild(zonesWrap);

  // Right group columns (十六排 through 二十二排)
  const rightCols=frow(A);
  rightCols.style.alignItems='flex-start';
  [['十六排','十七排',43],['十八排','十九排',45],['二十排','二十一排',46]
  ].forEach(([a,b,n])=>rightCols.appendChild(vpair(a,b,n)));
  rightCols.appendChild(vcol('二十二排',rng(46)));

  // Full main row - left aligned, evenly spaced to fill 13排 width
  // 13排 width = rowLbl(30) + G + 47*(HCW+G) - G
  const row13W = 30 + G + 47*(HCW+G) - G;

  // Total columns width:
  // Left: 十四排(CW) + 7 pairs(BW+NW+BW+NW+BW each)
  // Right: 3 pairs + 二十二排(CW)
  const pairW = BW+NW+BW+NW+BW;
  const totalColsW = CW + 7*pairW + 3*pairW + CW;
  // Remaining space to distribute as aisles (8 gaps in left, 1 between left/right, 3 gaps in right = 12 total)
  const totalAisles = 12;
  const aisleW = Math.floor((row13W - totalColsW) / totalAisles);

  // Right group: rightCols on top, rightBot below (vertically stacked, same width)
  const rightGroup=fcol(A);
  rightGroup.style.alignItems='flex-start';
  rightGroup.appendChild(rightCols);

  const divRight=D();divRight.style.cssText=`height:1px;background:var(--bdr);margin:${A}px 0`;
  rightGroup.appendChild(divRight);

  const rightBot=frow(aisleW);
  rightBot.style.alignItems='flex-start';
  rightBot.appendChild(vpair('30排','31排',5));
  rightBot.appendChild(vpair('32排','33排',5));
  rightBot.appendChild(vpair('34排','35排',5));
  rightBot.appendChild(vcol('36排',[1,2,3,4,5,6,7]));
  rightGroup.appendChild(rightBot);

  // Left group: leftBlock on top, leftBot below
  const leftGroup=fcol(A);
  leftGroup.style.alignItems='flex-start';
  leftGroup.appendChild(leftBlock);

  const divLeft=D();divLeft.style.cssText=`height:1px;background:var(--bdr);margin:${A}px 0`;
  leftGroup.appendChild(divLeft);

  const leftBotRow=frow(aisleW);
  leftBotRow.style.alignItems='flex-start';
  const yCol=fcol(G);
  yCol.appendChild(colLbl('Y區'));
  yCol.appendChild(makeZone('Y區',CW,CH*2));
  leftBotRow.appendChild(yCol);
  const b37wrap=frow(aisleW);
  b37wrap.style.alignItems='flex-start';
  b37wrap.appendChild(vcol('37排',rng(5)));
  const dce=frow(G);
  dce.appendChild(makeZone('D區\n(七格)',CW*2,CH*4));
  dce.appendChild(makeZone('C區\n(七格)',CW*2,CH*4));
  dce.appendChild(makeZone('E區\n(七格)',CW*2,CH*4));
  b37wrap.appendChild(dce);
  leftBotRow.appendChild(b37wrap);
  leftBotRow.appendChild(vpair('24排','25排',5));
  leftBotRow.appendChild(vpair('26排','27排',5));
  leftBotRow.appendChild(vpair('28排','29排',5));
  leftGroup.appendChild(leftBotRow);

  // Full layout
  const mainRow=frow(aisleW);
  mainRow.style.alignItems='flex-start';
  mainRow.appendChild(leftGroup);
  mainRow.appendChild(hsp(aisleW));
  mainRow.appendChild(rightGroup);

  // Update gaps
  leftCols.style.gap=aisleW+'px';
  rightCols.style.gap=aisleW+'px';

  mc.appendChild(mainRow);
  updateStats();
}

function updateStats(){
  let t=0,f=0;
  document.querySelectorAll('.cell').forEach(e=>{t++;if(gi(e.dataset.key)?.name)f++;});
  document.getElementById('fc').textContent=f;
  document.getElementById('ec').textContent=t-f;
}

function selectStall(key){
  selKey=key;
  refreshAll();
  const[rowId,num]=pk(key);renderPanel(key,rowId,num);
}

function renderPanel(key,rowId,num){
  const dn=num==='z'?'（區塊）':num+'號';
  document.getElementById('phc').innerHTML=`<div class="sid">${rowId} ${dn}</div><div class="dbadge">${DL[today]}</div>`;
  const info=gi(key)||{};
  const ds=DAYS.map(d=>{const di=data[key]&&data[key][d];return`<div class="drw ${d===today?'cur':''}"><div class="dn">${DL[d]}</div><div class="do ${di&&di.name?'':'empty'}">${di&&di.name?di.name:'（空）'}</div></div>`}).join('');
  let oss='';
  if(info.name){
    const others=Object.keys(data).filter(k=>k!==key&&data[k][today]&&data[k][today].name===info.name);
    if(others.length)oss=`<div class="oss"><div class="ost">${info.name} 本日其他格位</div><div class="osl">${others.map(k=>`<div class="osb" onclick="jump('${k}')">${fk(k)}</div>`).join('')}</div></div>`;
  }
  document.getElementById('pb').innerHTML=`
    <div class="drws">${ds}</div><div class="divider"></div>
    <div class="subt">${DL[today]} 格主資料</div>
    <div class="fg"><label class="fl">姓名</label><input class="fi" id="fn" placeholder="格主姓名" value="${info.name||''}"></div>
    <div class="fg"><label class="fl">電話</label><input class="fi" id="fp" placeholder="聯絡電話" value="${info.phone||''}"></div>
    <div class="fg"><label class="fl">地址</label><input class="fi" id="fa" placeholder="聯絡地址" value="${info.address||''}"></div>
    <button class="btn btnp" onclick="save('${key}')">💾 儲存</button>
    ${info.name?`<button class="btn btnd" onclick="del('${key}')">🗑 清除</button>`:''}
    ${oss}`;
}

function fk(key){const[r,n]=pk(key);return n==='z'?r:`${r} ${n}號`}

function save(key){
  const name=document.getElementById('fn').value.trim();
  const phone=document.getElementById('fp').value.trim();
  const address=document.getElementById('fa').value.trim();
  if(!data[key])data[key]={};
  data[key][today]={name,phone,address};
  localStorage.setItem('nm7',JSON.stringify(data));
  refreshAll();updateStats();
  const[r,n]=pk(key);renderPanel(key,r,n);
  showToast('✅ 已儲存');
}

function del(key){
  if(!confirm('確定清除？'))return;
  if(data[key]){delete data[key][today];if(!Object.keys(data[key]).length)delete data[key];}
  localStorage.setItem('nm7',JSON.stringify(data));
  refreshAll();updateStats();
  const[r,n]=pk(key);renderPanel(key,r,n);
  showToast('🗑 已清除');
}

function jump(key){
  const e=document.querySelector(`[data-key="${CSS.escape(key)}"].cell,[data-key="${CSS.escape(key)}"].hcell,[data-key="${CSS.escape(key)}"].zone`);
  if(e)e.scrollIntoView({behavior:'smooth',block:'center'});
  selectStall(key);
}

document.getElementById('si').addEventListener('input',function(){
  const q=this.value.trim(),sr=document.getElementById('sr');
  if(!q){sr.classList.remove('open');return;}
  const owners={};
  Object.keys(data).forEach(key=>{DAYS.forEach(d=>{const i=data[key][d];if(i&&i.name){if(!owners[i.name])owners[i.name]={...i,stalls:[]};owners[i.name].stalls.push({key,day:d});}});});
  const matches=Object.entries(owners).filter(([n])=>n.includes(q));
  sr.innerHTML=matches.length?matches.map(([name,info])=>{
    const pills=info.stalls.filter(s=>s.day===today).map(s=>`<span>${fk(s.key)}</span>`).join('');
    return`<div class="sri" onclick="hlOwner('${name}')"><div class="sri-n">${name} <span style="color:var(--tx2);font-size:10px">${info.phone||''}</span></div><div class="sri-s">${pills||'<span style="color:var(--tx2)">本日無格位</span>'}</div></div>`;
  }).join(''):'<div class="sri" style="color:var(--tx2)">找不到格主</div>';
  sr.classList.add('open');
});

document.addEventListener('click',e=>{if(!e.target.closest('.swrap'))document.getElementById('sr').classList.remove('open');});

function hlOwner(name){
  document.getElementById('sr').classList.remove('open');
  document.getElementById('si').value=name;
  document.querySelectorAll('.cell.hl,.hcell.hl').forEach(e=>e.classList.remove('hl'));
  const stalls=Object.keys(data).filter(k=>data[k][today]&&data[k][today].name===name);
  stalls.forEach(key=>{
    const e=document.querySelector(`.cell[data-key="${CSS.escape(key)}"],.hcell[data-key="${CSS.escape(key)}"]`);
    if(e){e.classList.add('hl');e.scrollIntoView({behavior:'smooth',block:'center'});}
  });
  if(!stalls.length){showToast(`${name} 本日沒有格位`);return;}
  showToast(`已標示 ${name} 的 ${stalls.length} 個格位`);selectStall(stalls[0]);
}

document.getElementById('dayTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.dtab');if(!btn)return;
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');today=btn.dataset.day;
  refreshAll();updateStats();
  if(selKey){const[r,n]=pk(selKey);renderPanel(selKey,r,n);}
});

/* ── CSV Import ── */
const CSV_DAYS = ['thu','fri','sat','sun'];
const CSV_DAY_NAMES = {thu:'週四',fri:'週五',sat:'週六',sun:'週日'};
const CSV_HEADERS = [
  '排名','號碼',
  '週四姓名','週四電話','週四地址',
  '週五姓名','週五電話','週五地址',
  '週六姓名','週六電話','週六地址',

];

    ['五排',rng(32)],['六排',rng(32)],['七排',rng(32)],['八排',rng(32)],

    ['十六排',rng(43)],['十七排',rng(43)],['十八排',rng(45)],['十九排',rng(45)],
    ['二十排',rng(46)],['二十一排',rng(46)],['二十二排',rng(46)],
    ['15排',rng(29)],['二十三排',rng(6)],
    ['37排',rng(5)],['24排',rng(5)],['25排',rng(5)],['26排',rng(5)],
    ['27排',rng(5)],['28排',rng(5)],['29排',rng(5)],['30排',rng(5)],
    ['31排',rng(5)],['32排',rng(5)],['33排',rng(5)],['34排',rng(5)],['35排',rng(5)],

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return null;
  // Skip header row
  const start=lines[0].includes('排名')?1:0;
  const records=[];
  for(let i=start;i<lines.length;i++){
    const cols=lines[i].split(',');
    if(cols.length<2)continue;
    const rowId=cols[0].trim();
    const num=cols[1].trim();
    if(!rowId||!num)continue;
    records.push({
      rowId, num,
      thu:{name:(cols[2]||'').trim(),phone:(cols[3]||'').trim(),address:(cols[4]||'').trim()},
      fri:{name:(cols[5]||'').trim(),phone:(cols[6]||'').trim(),address:(cols[7]||'').trim()},
      sat:{name:(cols[8]||'').trim(),phone:(cols[9]||'').trim(),address:(cols[10]||'').trim()},
      sun:{name:(cols[11]||'').trim(),phone:(cols[12]||'').trim(),address:(cols[13]||'').trim()},
    });
  }
  return records;
}

function previewCSV(){
  const text=document.getElementById('csvInput').value.trim();
  const prev=document.getElementById('csvPreview');
  if(!text){prev.innerHTML='<span style="color:#e74c3c">請先貼上 CSV 內容</span>';return;}
  const records=parseCSV(text);
  if(!records||!records.length){prev.innerHTML='<span style="color:#e74c3c">無法解析 CSV，請確認格式正確</span>';return;}
  // Count filled
  let filled=0;
  records.forEach(r=>{
    CSV_DAYS.forEach(d=>{if(r[d].name)filled++;});
  });
  prev.innerHTML=`<span style="color:var(--grn)">✅ 解析成功：共 ${records.length} 個格位，${filled} 筆有填資料</span>`;
}

function importCSV(){
  const text=document.getElementById('csvInput').value.trim();
  const mode=document.getElementById('csvMode').value;
  if(!text){showToast('請先貼上 CSV 內容');return;}
  const records=parseCSV(text);
  if(!records||!records.length){showToast('無法解析 CSV');return;}

  if(mode==='overwrite'){
    // Clear all data first
    Object.keys(data).forEach(k=>delete data[k]);
  }

  let count=0;
  records.forEach(r=>{
    const key=sk(r.rowId,isNaN(r.num)?r.num:parseInt(r.num));
    CSV_DAYS.forEach(d=>{
      const info=r[d];
      if(info.name||info.phone||info.address){
        if(!data[key])data[key]={};
        if(mode==='merge'){
          // Only update fields that have values
          if(!data[key][d])data[key][d]={name:'',phone:'',address:''};
          if(info.name)data[key][d].name=info.name;
          if(info.phone)data[key][d].phone=info.phone;
          if(info.address)data[key][d].address=info.address;
        } else {
          data[key][d]=info;
        }
        count++;
      }
    });
  });

  localStorage.setItem('nm7',JSON.stringify(data));
  refreshAll();
  updateStats();
  showToast(`✅ 已匯入 ${count} 筆資料`);
  closeCSV();
}
function openBulk(){
  const modal=document.getElementById('bulkModal');
  modal.style.display='flex';
  // Sync day selector to current day
  document.getElementById('bulkDay').value=today;
  // Populate row select if empty
  const sel=document.getElementById('bulkRow');

    ALL_ROWS.forEach(r=>{

      sel.appendChild(o);

function closeBulk(){
  document.getElementById('bulkModal').style.display='none';
}

function loadBulkTable(){
  const rowId=document.getElementById('bulkRow').value;
  const day=document.getElementById('bulkDay').value;
  if(!rowId)return;
  const stalls=ROW_STALLS[rowId]||[];
  const wrap=document.getElementById('bulkTableWrap');

  let html=`<table class="btbl">
    <thead><tr>
      <th style="width:80px">格位</th>
      <th>姓名</th>
      <th>電話</th>
      <th>地址</th>
    </tr></thead><tbody>`;

  stalls.forEach(num=>{
    const key=sk(rowId,num);
    const info=(data[key]&&data[key][day])||{};
    const hasData=!!(info.name||info.phone||info.address);
    html+=`<tr class="${hasData?'has-data':''}">
      <td>${rowId} ${num}號</td>
      <td><input type="text" data-key="${key}" data-field="name" value="${(info.name||'').replace(/"/g,'&quot;')}" placeholder="格主姓名" tabindex="1"></td>
      <td><input type="text" data-key="${key}" data-field="phone" value="${(info.phone||'').replace(/"/g,'&quot;')}" placeholder="電話" tabindex="1"></td>
      <td><input type="text" data-key="${key}" data-field="address" value="${(info.address||'').replace(/"/g,'&quot;')}" placeholder="地址" tabindex="1"></td>
    </tr>`;
  });

  html+=`</tbody></table>`;
  wrap.innerHTML=html;

  // Highlight row when any input changes
  wrap.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      inp.closest('tr').classList.add('has-data');
    });
  });
}

// Reload table when day changes
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('bulkDay').addEventListener('change',loadBulkTable);
});

function importBulk(){
  const rowId=document.getElementById('bulkRow').value;
  const day=document.getElementById('bulkDay').value;
  if(!rowId){showToast('請先選擇排');return;}

  const inputs=document.querySelectorAll('#bulkTableWrap input');
  let count=0;

  // Collect all values per key
  const collected={};
  inputs.forEach(inp=>{
    const key=inp.dataset.key;
    const field=inp.dataset.field;
    if(!collected[key])collected[key]={};
    collected[key][field]=inp.value.trim();
  });

  // Write to data
  Object.entries(collected).forEach(([key,fields])=>{
    if(fields.name||fields.phone||fields.address){
      if(!data[key])data[key]={};
      data[key][day]={name:fields.name||'',phone:fields.phone||'',address:fields.address||''};
      count++;
    } else {
      // Clear if all empty
      if(data[key]&&data[key][day]){
        delete data[key][day];
        if(!Object.keys(data[key]).length)delete data[key];
      }
    }
  });

  localStorage.setItem('nm7',JSON.stringify(data));
  refreshAll();
  updateStats();
  showToast(`✅ 已匯入 ${count} 筆資料`);
  closeBulk();
}
